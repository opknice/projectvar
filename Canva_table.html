<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200">
  <title>Canva Editable League Table</title>

  <style>
    :root {
      --row-color-odd: 71, 110, 236;
      --row-color-even: 169, 192, 255;
      --row-alpha: .10;
      --text-color: #fff;
      --panel-bg: rgba(10, 14, 26, .82);
      --panel-line: rgba(255, 255, 255, .18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text-color);
      background: #101522;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 360px minmax(840px, 1fr);
      min-height: 100vh;
    }

    .settings-panel {
      position: sticky;
      top: 0;
      z-index: 5;
      height: 100vh;
      overflow: auto;
      padding: 16px;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-line);
      backdrop-filter: blur(10px);
    }

    .settings-panel h1 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.25;
    }

    .field-group {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: rgba(255, 255, 255, .82);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, .20);
      border-radius: 6px;
      padding: 8px 9px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
      font: 13px "Segoe UI", sans-serif;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(169, 192, 255, .9);
      box-shadow: 0 0 0 2px rgba(71, 110, 236, .25);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      color: #111827;
      background: #fff;
      font: 700 13px "Segoe UI", sans-serif;
      cursor: pointer;
    }

    button:hover { background: #eaf0ff; }
    button.primary { background: #a9c0ff; }
    button.danger { background: #ffd0d0; }
    button:disabled {
      cursor: wait;
      opacity: .62;
    }

    .status {
      min-height: 36px;
      padding: 8px 0;
      color: rgba(255, 255, 255, .88);
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .preview-wrap {
      min-height: 100vh;
      overflow: auto;
      background: #0a0f1f;
    }

    .stage {
      width: 1024px;
      min-height: 768px;
      margin: 0 auto;
      padding: 20px;
      background-image:
        var(--main-logo-bg, none),
        var(--stage-bg, url("images/bg2.jpg"));
      background-repeat: no-repeat, no-repeat;
      background-position: center 20px, center center;
      background-size: 250px auto, cover;
      color: #fff;
    }

    .top-spacer { height: 112px; }

    table {
      width: 80%;
      margin: 0 auto;
      border-collapse: collapse;
      background: transparent;
      backdrop-filter: blur(4px);
    }

    th,
    td {
      padding: 10px;
      border: none;
      text-align: center;
      vertical-align: middle;
      font-size: 1.2rem;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .45);
    }

    td.team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 0;
      text-align: left;
    }

    img.logo {
      max-width: 35px;
      width: 35px;
      height: 35px;
      object-fit: contain;
      flex: 0 0 35px;
    }

    #tableBody tr:nth-child(odd) {
      background: rgba(var(--row-color-odd), var(--row-alpha));
    }

    #tableBody tr:nth-child(even) {
      background: rgba(var(--row-color-even), var(--row-alpha));
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: none; }
    }

    #tableBody tr {
      opacity: 0;
      transform: translateY(20px);
      --delay: 0s;
      animation: slideInUp .5s ease-out forwards;
      animation-delay: var(--delay);
    }

    .no-data td {
      font-size: 1.1rem;
    }

    body.exporting #tableBody tr {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
      animation: none !important;
    }

    body.exporting .settings-panel { display: none !important; }
    body.exporting .app-shell { display: block; }

    @media (max-width: 1100px) {
      .app-shell { grid-template-columns: 1fr; }
      .settings-panel {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--panel-line);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="settings-panel" data-html2canvas-ignore="true">
      <h1>Canva League Table</h1>

      <div class="field-group">
        <label>
          Firebase config
          <textarea id="firebaseConfigInput" spellcheck="false" placeholder='{"apiKey":"...","authDomain":"...","databaseURL":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'></textarea>
        </label>
      </div>

      <div class="field-group">
        <div class="field-row">
          <label>ชื่อไฟล์/ชื่อลีก <input id="leagueNameInput" value="league-table"></label>
          <label>Realtime DB path <input id="matchesPathInput" value="matches"></label>
        </div>
      </div>

      <div class="field-group">
        <div class="field-row">
          <label>ทีม A field <input id="teamAFieldInput" value="teamA"></label>
          <label>ทีม B field <input id="teamBFieldInput" value="teamB"></label>
        </div>
        <div class="field-row">
          <label>สกอร์ A field <input id="scoreAFieldInput" value="scoreA"></label>
          <label>สกอร์ B field <input id="scoreBFieldInput" value="scoreB"></label>
        </div>
      </div>

      <div class="field-group">
        <div class="field-row">
          <label>พื้นหลัง <input id="backgroundInput" value="images/bg2.jpg"></label>
          <label>โลโก้หัวตาราง <input id="mainLogoInput" value="images/logoalcohol2.png"></label>
        </div>
        <div class="field-row">
          <label>โฟลเดอร์โลโก้ทีม <input id="logoBaseInput" value="logos"></label>
          <label>โลโก้สำรอง <input id="defaultLogoInput" value="images/logo.png"></label>
        </div>
      </div>

      <div class="field-group">
        <div class="field-row">
          <label>สีแถวคี่ RGB <input id="oddColorInput" value="71,110,236"></label>
          <label>สีแถวคู่ RGB <input id="evenColorInput" value="169,192,255"></label>
        </div>
        <label>ความโปร่งแสงแถว <input id="rowAlphaInput" type="number" value="0.10" min="0" max="1" step="0.01"></label>
      </div>

      <div class="button-row">
        <button id="connectBtn" class="primary" type="button">โหลดตาราง</button>
        <button id="saveBtn" type="button">บันทึกค่า</button>
        <button id="resetBtn" class="danger" type="button">ล้างค่า</button>
      </div>

      <div class="button-row">
        <button id="copyPngBtn" type="button">Copy PNG</button>
        <button id="downloadPngBtn" type="button">Download PNG</button>
        <button id="copyEditableBtn" type="button">Copy แบบแก้ไขได้</button>
        <button id="downloadPptxBtn" type="button">Download PPTX แก้ไขได้</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </aside>

    <main class="preview-wrap">
      <section id="stage" class="stage">
        <div class="top-spacer"></div>
        <table id="leagueTable">
          <thead>
            <tr>
              <th>อันดับ</th>
              <th>ทีม</th>
              <th>แข่ง</th>
              <th>ชนะ</th>
              <th>เสมอ</th>
              <th>แพ้</th>
              <th>ได้</th>
              <th>เสีย</th>
              <th>ได้-เสีย</th>
              <th>คะแนน</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const STORAGE_KEY = 'canva-league-table-settings';
    const tableHeaders = ['อันดับ', 'ทีม', 'แข่ง', 'ชนะ', 'เสมอ', 'แพ้', 'ได้', 'เสีย', 'ได้-เสีย', 'คะแนน'];
    const initTeam = () => ({ P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0, Pts: 0 });

    const els = {
      firebaseConfig: document.getElementById('firebaseConfigInput'),
      leagueName: document.getElementById('leagueNameInput'),
      matchesPath: document.getElementById('matchesPathInput'),
      teamAField: document.getElementById('teamAFieldInput'),
      teamBField: document.getElementById('teamBFieldInput'),
      scoreAField: document.getElementById('scoreAFieldInput'),
      scoreBField: document.getElementById('scoreBFieldInput'),
      background: document.getElementById('backgroundInput'),
      mainLogo: document.getElementById('mainLogoInput'),
      logoBase: document.getElementById('logoBaseInput'),
      defaultLogo: document.getElementById('defaultLogoInput'),
      oddColor: document.getElementById('oddColorInput'),
      evenColor: document.getElementById('evenColorInput'),
      rowAlpha: document.getElementById('rowAlphaInput'),
      stage: document.getElementById('stage'),
      tableBody: document.getElementById('tableBody'),
      status: document.getElementById('status'),
      connectBtn: document.getElementById('connectBtn'),
      saveBtn: document.getElementById('saveBtn'),
      resetBtn: document.getElementById('resetBtn'),
      copyPngBtn: document.getElementById('copyPngBtn'),
      downloadPngBtn: document.getElementById('downloadPngBtn'),
      copyEditableBtn: document.getElementById('copyEditableBtn'),
      downloadPptxBtn: document.getElementById('downloadPptxBtn')
    };

    let latestTableData = [];
    let unsubscribeMatches = null;

    const setStatus = message => {
      els.status.textContent = message;
    };

    const setBusy = busy => {
      [
        els.connectBtn,
        els.saveBtn,
        els.resetBtn,
        els.copyPngBtn,
        els.downloadPngBtn,
        els.copyEditableBtn,
        els.downloadPptxBtn
      ].forEach(button => {
        button.disabled = busy;
      });
    };

    const settingsFromInputs = () => ({
      firebaseConfigText: els.firebaseConfig.value.trim(),
      leagueName: els.leagueName.value.trim() || 'league-table',
      matchesPath: els.matchesPath.value.trim() || 'matches',
      fields: {
        teamA: els.teamAField.value.trim() || 'teamA',
        teamB: els.teamBField.value.trim() || 'teamB',
        scoreA: els.scoreAField.value.trim() || 'scoreA',
        scoreB: els.scoreBField.value.trim() || 'scoreB'
      },
      assets: {
        background: els.background.value.trim() || 'images/bg2.jpg',
        mainLogo: els.mainLogo.value.trim(),
        logoBase: els.logoBase.value.trim() || 'logos',
        defaultLogo: els.defaultLogo.value.trim() || 'images/logo.png'
      },
      colors: {
        odd: els.oddColor.value.trim() || '71,110,236',
        even: els.evenColor.value.trim() || '169,192,255',
        alpha: Number(els.rowAlpha.value || 0.1)
      }
    });

    const applySettingsToInputs = settings => {
      if (!settings) return;
      els.firebaseConfig.value = settings.firebaseConfigText || '';
      els.leagueName.value = settings.leagueName || 'league-table';
      els.matchesPath.value = settings.matchesPath || 'matches';
      els.teamAField.value = settings.fields?.teamA || 'teamA';
      els.teamBField.value = settings.fields?.teamB || 'teamB';
      els.scoreAField.value = settings.fields?.scoreA || 'scoreA';
      els.scoreBField.value = settings.fields?.scoreB || 'scoreB';
      els.background.value = settings.assets?.background || 'images/bg2.jpg';
      els.mainLogo.value = settings.assets?.mainLogo || 'images/logoalcohol2.png';
      els.logoBase.value = settings.assets?.logoBase || 'logos';
      els.defaultLogo.value = settings.assets?.defaultLogo || 'images/logo.png';
      els.oddColor.value = settings.colors?.odd || '71,110,236';
      els.evenColor.value = settings.colors?.even || '169,192,255';
      els.rowAlpha.value = Number.isFinite(settings.colors?.alpha) ? settings.colors.alpha : 0.1;
    };

    const parseFirebaseConfig = text => {
      const trimmed = text.trim();
      if (!trimmed) throw new Error('กรุณาใส่ Firebase config');

      try {
        return JSON.parse(trimmed);
      } catch (jsonError) {
        const objectText = trimmed
          .replace(/^\s*(const|let|var)\s+firebaseConfig\s*=\s*/, '')
          .replace(/;\s*$/, '');
        return Function(`"use strict"; return (${objectText});`)();
      }
    };

    const escapeHtml = value => String(value).replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    const fileSafe = value => String(value || 'league-table')
      .trim()
      .replace(/[\\/:*?"<>|]+/g, '-')
      .replace(/\s+/g, '-')
      .slice(0, 80) || 'league-table';

    const fileNameDate = () => new Date().toISOString().slice(0, 10);

    const updateStageStyle = settings => {
      document.documentElement.style.setProperty('--row-color-odd', settings.colors.odd);
      document.documentElement.style.setProperty('--row-color-even', settings.colors.even);
      document.documentElement.style.setProperty('--row-alpha', Math.min(Math.max(settings.colors.alpha, 0), 1));
      els.stage.style.setProperty('--stage-bg', `url("${settings.assets.background}")`);
      els.stage.style.setProperty('--main-logo-bg', settings.assets.mainLogo ? `url("${settings.assets.mainLogo}")` : 'none');
    };

    const renderNoData = message => {
      latestTableData = [];
      els.tableBody.innerHTML = `
        <tr class="no-data">
          <td colspan="10">${escapeHtml(message || 'ยังไม่มีข้อมูลการแข่งขัน')}</td>
        </tr>
      `;
    };

    const renderTable = (matches, settings) => {
      const stats = {};
      const { teamA, teamB, scoreA, scoreB } = settings.fields;

      matches.forEach(match => {
        const aName = String(match?.[teamA] || '').trim();
        const bName = String(match?.[teamB] || '').trim();
        if (!aName || !bName) return;

        if (!stats[aName]) stats[aName] = initTeam();
        if (!stats[bName]) stats[bName] = initTeam();

        const aScore = Number(match?.[scoreA]);
        const bScore = Number(match?.[scoreB]);
        if (!Number.isFinite(aScore) || !Number.isFinite(bScore)) return;

        stats[aName].P++;
        stats[bName].P++;
        stats[aName].GF += aScore;
        stats[aName].GA += bScore;
        stats[bName].GF += bScore;
        stats[bName].GA += aScore;

        if (aScore > bScore) {
          stats[aName].W++;
          stats[aName].Pts += 3;
          stats[bName].L++;
        } else if (aScore < bScore) {
          stats[bName].W++;
          stats[bName].Pts += 3;
          stats[aName].L++;
        } else {
          stats[aName].D++;
          stats[bName].D++;
          stats[aName].Pts++;
          stats[bName].Pts++;
        }
      });

      latestTableData = Object.keys(stats).map(team => {
        const s = stats[team];
        s.GD = s.GF - s.GA;
        return { team, ...s };
      }).sort((a, b) => {
        if (b.Pts !== a.Pts) return b.Pts - a.Pts;
        if (b.GD !== a.GD) return b.GD - a.GD;
        if (b.GF !== a.GF) return b.GF - a.GF;
        return a.team.localeCompare(b.team);
      });

      if (latestTableData.length === 0) {
        renderNoData('ยังไม่มีแมตช์ที่มีผลสกอร์');
        return;
      }

      els.tableBody.innerHTML = '';
      latestTableData.forEach((row, i) => {
        const safeName = encodeURIComponent(row.team);
        const logoSrc = `${settings.assets.logoBase}/${safeName}.png`;
        const tr = document.createElement('tr');
        tr.style.setProperty('--delay', `${i * 0.05}s`);
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="team-cell">
            <img class="logo" src="${logoSrc}" alt="${escapeHtml(row.team)} logo" onerror="this.onerror=null; this.src='${settings.assets.defaultLogo}'">
            ${escapeHtml(row.team)}
          </td>
          <td>${row.P}</td>
          <td>${row.W}</td>
          <td>${row.D}</td>
          <td>${row.L}</td>
          <td>${row.GF}</td>
          <td>${row.GA}</td>
          <td>${row.GD}</td>
          <td>${row.Pts}</td>
        `;
        els.tableBody.appendChild(tr);
      });
    };

    const connectFirebase = () => {
      const settings = settingsFromInputs();
      let firebaseConfig;

      try {
        firebaseConfig = parseFirebaseConfig(settings.firebaseConfigText);
      } catch (error) {
        setStatus(error.message || 'Firebase config ไม่ถูกต้อง');
        return;
      }

      try {
        updateStageStyle(settings);
        if (unsubscribeMatches) unsubscribeMatches();

        setStatus('กำลังโหลดข้อมูล...');
        const app = initializeApp(firebaseConfig, `canva-table-${Date.now()}`);
        const db = getDatabase(app);
        const matchesRef = ref(db, settings.matchesPath);

        unsubscribeMatches = onValue(matchesRef, snapshot => {
          if (!snapshot.exists()) {
            renderNoData('ยังไม่มีข้อมูลการแข่งขัน');
            setStatus('เชื่อมต่อแล้ว แต่ยังไม่มีข้อมูล');
            return;
          }

          const matches = [];
          snapshot.forEach(child => {
            matches.push(child.val() || {});
          });

          renderTable(matches, settings);
          setStatus(`โหลดสำเร็จ ${matches.length} รายการ`);
        }, error => {
          console.error(error);
          renderNoData('โหลดข้อมูลไม่สำเร็จ');
          setStatus(error.message || 'โหลด Firebase ไม่สำเร็จ');
        });
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'เชื่อมต่อ Firebase ไม่สำเร็จ');
      }
    };

    const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

    const waitForImages = async () => {
      await Promise.all(Array.from(document.images).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      }));
    };

    const blobToDataUrl = blob => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });

    const assetToDataUrl = async (src, fallbackSrc = '') => {
      try {
        const response = await fetch(src);
        if (!response.ok) throw new Error(src);
        return await blobToDataUrl(await response.blob());
      } catch (error) {
        if (!fallbackSrc || fallbackSrc === src) throw error;
        const response = await fetch(fallbackSrc);
        if (!response.ok) throw new Error(fallbackSrc);
        return await blobToDataUrl(await response.blob());
      }
    };

    const getImageSize = dataUrl => new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve({ width: img.naturalWidth || 1, height: img.naturalHeight || 1 });
      img.onerror = () => resolve({ width: 1, height: 1 });
      img.src = dataUrl;
    });

    const buildCanvasBlob = async () => {
      if (!window.html2canvas) throw new Error('ไม่พบ html2canvas');
      await waitForImages();
      document.body.classList.add('exporting');
      await wait(80);

      try {
        const canvas = await window.html2canvas(els.stage, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: true
        });
        return await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1));
      } finally {
        document.body.classList.remove('exporting');
      }
    };

    const downloadBlob = (blob, fileName) => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      link.click();
      URL.revokeObjectURL(url);
    };

    const copyPng = async () => {
      if (!navigator.clipboard || !window.ClipboardItem) {
        setStatus('เบราว์เซอร์นี้ไม่รองรับ Copy PNG');
        return;
      }

      setBusy(true);
      setStatus('กำลัง Copy PNG...');
      try {
        const blob = await buildCanvasBlob();
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        setStatus('Copy PNG แล้ว');
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'Copy PNG ไม่สำเร็จ');
      } finally {
        setBusy(false);
      }
    };

    const downloadPng = async () => {
      setBusy(true);
      setStatus('กำลังสร้าง PNG...');
      try {
        const settings = settingsFromInputs();
        const blob = await buildCanvasBlob();
        downloadBlob(blob, `${fileSafe(settings.leagueName)}-${fileNameDate()}.png`);
        setStatus('ดาวน์โหลด PNG แล้ว');
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'สร้าง PNG ไม่สำเร็จ');
      } finally {
        setBusy(false);
      }
    };

    const buildEditableHtml = async settings => {
      if (latestTableData.length === 0) throw new Error('ยังไม่มีข้อมูลสำหรับ export');

      const bgData = await assetToDataUrl(settings.assets.background);
      const mainLogoData = settings.assets.mainLogo ? await assetToDataUrl(settings.assets.mainLogo) : '';
      const teamLogoData = {};

      for (const row of latestTableData) {
        const safeName = encodeURIComponent(row.team);
        teamLogoData[row.team] = await assetToDataUrl(`${settings.assets.logoBase}/${safeName}.png`, settings.assets.defaultLogo);
      }

      const headerHtml = tableHeaders.map(header => (
        `<th style="padding:10px;border:0;text-align:center;vertical-align:middle;font:700 19px Segoe UI,sans-serif;color:#fff;">${escapeHtml(header)}</th>`
      )).join('');

      const rowsHtml = latestTableData.map((row, index) => {
        const bgColor = index % 2 === 0
          ? `rgba(${settings.colors.odd},${settings.colors.alpha})`
          : `rgba(${settings.colors.even},${settings.colors.alpha})`;
        const values = [index + 1, row.P, row.W, row.D, row.L, row.GF, row.GA, row.GD, row.Pts];
        const cells = values.map(value => (
          `<td style="padding:10px;border:0;text-align:center;vertical-align:middle;font:400 19px Segoe UI,sans-serif;color:#fff;">${escapeHtml(value)}</td>`
        ));
        cells.splice(1, 0, `<td style="padding:10px 10px 10px 0;border:0;text-align:left;vertical-align:middle;font:400 19px Segoe UI,sans-serif;color:#fff;white-space:nowrap;"><img src="${teamLogoData[row.team]}" alt="" style="width:35px;height:35px;object-fit:contain;vertical-align:middle;margin-right:8px;"><span>${escapeHtml(row.team)}</span></td>`);
        return `<tr style="background:${bgColor};">${cells.join('')}</tr>`;
      }).join('');

      const logoBg = mainLogoData ? `url('${mainLogoData}') no-repeat center 20px / 250px auto,` : '';
      const html = `<div style="box-sizing:border-box;width:1024px;min-height:768px;padding:20px;background:${logoBg}url('${bgData}') no-repeat center center / cover;color:#fff;font-family:Segoe UI,sans-serif;"><div style="height:112px;"></div><table style="width:80%;margin:0 auto;border-collapse:collapse;background:transparent;"><thead><tr>${headerHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`;
      const plainText = [
        tableHeaders.join('\t'),
        ...latestTableData.map((row, index) => [index + 1, row.team, row.P, row.W, row.D, row.L, row.GF, row.GA, row.GD, row.Pts].join('\t'))
      ].join('\n');

      return { html, plainText };
    };

    const copyEditable = async () => {
      if (!navigator.clipboard || !window.ClipboardItem) {
        setStatus('เบราว์เซอร์นี้ไม่รองรับ Copy แบบแก้ไขได้');
        return;
      }

      setBusy(true);
      setStatus('กำลัง Copy แบบแก้ไขได้...');
      try {
        const settings = settingsFromInputs();
        const { html, plainText } = await buildEditableHtml(settings);
        await navigator.clipboard.write([
          new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([plainText], { type: 'text/plain' })
          })
        ]);
        setStatus('Copy แบบแก้ไขได้แล้ว');
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'Copy แบบแก้ไขได้ไม่สำเร็จ');
      } finally {
        setBusy(false);
      }
    };

    const addEditableText = (slide, text, options) => {
      slide.addText(String(text), {
        margin: 0,
        fontFace: 'Segoe UI',
        color: 'FFFFFF',
        fit: 'shrink',
        valign: 'mid',
        breakLine: false,
        ...options
      });
    };

    const rgbToHex = value => {
      const parts = String(value).split(',').map(part => Number(part.trim()));
      if (parts.length !== 3 || parts.some(part => !Number.isFinite(part))) return '476EEC';
      return parts.map(part => Math.min(Math.max(part, 0), 255).toString(16).padStart(2, '0')).join('').toUpperCase();
    };

    const downloadPptx = async () => {
      if (latestTableData.length === 0) {
        setStatus('ยังไม่มีข้อมูลสำหรับสร้าง PPTX');
        return;
      }

      const PptxGen = window.pptxgen || window.PptxGenJS;
      if (!PptxGen || !window.JSZip) {
        setStatus('โหลดไลบรารี PPTX ไม่ครบ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วโหลดหน้าใหม่');
        return;
      }

      setBusy(true);
      setStatus('กำลังสร้าง PPTX...');
      try {
        const settings = settingsFromInputs();
        const pptx = new PptxGen();
        const rectShape = (pptx.ShapeType && pptx.ShapeType.rect) || 'rect';
        const slideW = 10.24;
        const rowH = 0.38;
        const tableY = 1.28;
        const slideH = Math.max(7.68, tableY + ((latestTableData.length + 1) * rowH) + 0.45);
        pptx.defineLayout({ name: 'CANVA_TABLE', width: slideW, height: slideH });
        pptx.layout = 'CANVA_TABLE';
        pptx.author = 'Scoreboard';
        pptx.title = settings.leagueName;
        pptx.lang = 'th-TH';

        const slide = pptx.addSlide();
        const bgData = await assetToDataUrl(settings.assets.background);
        slide.addImage({ data: bgData, x: 0, y: 0, w: slideW, h: slideH });

        if (settings.assets.mainLogo) {
          const logoData = await assetToDataUrl(settings.assets.mainLogo);
          const logoSize = await getImageSize(logoData);
          const logoW = 2.5;
          const logoH = logoW * (logoSize.height / logoSize.width);
          slide.addImage({ data: logoData, x: (slideW - logoW) / 2, y: 0.2, w: logoW, h: logoH });
        }

        const tableW = slideW * 0.8;
        const tableX = (slideW - tableW) / 2;
        const colW = [0.7, 2.55, 0.58, 0.58, 0.58, 0.58, 0.58, 0.58, 0.78, 0.68];
        const colScale = tableW / colW.reduce((sum, w) => sum + w, 0);
        const widths = colW.map(w => w * colScale);
        const rowColors = [rgbToHex(settings.colors.odd), rgbToHex(settings.colors.even)];
        const transparency = Math.round((1 - Math.min(Math.max(settings.colors.alpha, 0), 1)) * 100);

        let x = tableX;
        tableHeaders.forEach((header, colIndex) => {
          addEditableText(slide, header, {
            x,
            y: tableY,
            w: widths[colIndex],
            h: rowH,
            fontSize: 13,
            bold: true,
            align: 'center'
          });
          x += widths[colIndex];
        });

        for (const [rowIndex, row] of latestTableData.entries()) {
          const y = tableY + ((rowIndex + 1) * rowH);
          slide.addShape(rectShape, {
            x: tableX,
            y,
            w: tableW,
            h: rowH,
            fill: { color: rowColors[rowIndex % 2], transparency },
            line: { color: 'FFFFFF', transparency: 100 }
          });

          const safeName = encodeURIComponent(row.team);
          const logoSrc = `${settings.assets.logoBase}/${safeName}.png`;
          const rowValues = [rowIndex + 1, row.team, row.P, row.W, row.D, row.L, row.GF, row.GA, row.GD, row.Pts];

          x = tableX;
          for (const [colIndex, value] of rowValues.entries()) {
            if (colIndex === 1) {
              const teamLogoData = await assetToDataUrl(logoSrc, settings.assets.defaultLogo);
              slide.addImage({ data: teamLogoData, x: x + 0.03, y: y + 0.055, w: 0.27, h: 0.27 });
              addEditableText(slide, value, {
                x: x + 0.36,
                y,
                w: widths[colIndex] - 0.38,
                h: rowH,
                fontSize: 12.5,
                align: 'left'
              });
            } else {
              addEditableText(slide, value, {
                x,
                y,
                w: widths[colIndex],
                h: rowH,
                fontSize: 13,
                align: 'center'
              });
            }
            x += widths[colIndex];
          }
        }

        await pptx.writeFile({ fileName: `${fileSafe(settings.leagueName)}-${fileNameDate()}-canva-editable.pptx` });
        setStatus('ดาวน์โหลด PPTX แล้ว');
      } catch (error) {
        console.error(error);
        setStatus(error.message || 'สร้าง PPTX ไม่สำเร็จ');
      } finally {
        setBusy(false);
      }
    };

    const saveSettings = () => {
      const settings = settingsFromInputs();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      updateStageStyle(settings);
      setStatus('บันทึกค่าแล้ว');
    };

    const loadSettings = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          applySettingsToInputs(JSON.parse(raw));
        } catch (error) {
          console.error(error);
        }
      }
      updateStageStyle(settingsFromInputs());
    };

    const resetSettings = () => {
      localStorage.removeItem(STORAGE_KEY);
      applySettingsToInputs({
        firebaseConfigText: '',
        leagueName: 'league-table',
        matchesPath: 'matches',
        fields: { teamA: 'teamA', teamB: 'teamB', scoreA: 'scoreA', scoreB: 'scoreB' },
        assets: { background: 'images/bg2.jpg', mainLogo: 'images/logoalcohol2.png', logoBase: 'logos', defaultLogo: 'images/logo.png' },
        colors: { odd: '71,110,236', even: '169,192,255', alpha: 0.1 }
      });
      updateStageStyle(settingsFromInputs());
      renderNoData('ยังไม่ได้โหลดข้อมูล');
      setStatus('ล้างค่าแล้ว');
    };

    els.connectBtn.addEventListener('click', () => {
      saveSettings();
      connectFirebase();
    });
    els.saveBtn.addEventListener('click', saveSettings);
    els.resetBtn.addEventListener('click', resetSettings);
    els.copyPngBtn.addEventListener('click', copyPng);
    els.downloadPngBtn.addEventListener('click', downloadPng);
    els.copyEditableBtn.addEventListener('click', copyEditable);
    els.downloadPptxBtn.addEventListener('click', downloadPptx);

    [
      els.background,
      els.mainLogo,
      els.oddColor,
      els.evenColor,
      els.rowAlpha
    ].forEach(input => {
      input.addEventListener('input', () => updateStageStyle(settingsFromInputs()));
    });

    loadSettings();
    renderNoData('ใส่ Firebase config แล้วกดโหลดตาราง');
  </script>
</body>
</html>
