<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024">
  <title>ตารางคะแนนฟุตบอล + ข้อความล่าสุด (แสดงเฉพาะวันที่)</title>
  
  <style>
    :root {
      --row-color-odd:   71,110,236;
      --row-color-even: 169,192,255;
      --row-alpha:       0.10;
    }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
      background: 
        url('images/logoalcohol2.png') no-repeat center 20px,
        url('images/bg2.jpg')   no-repeat center center fixed;
      background-size: 250px auto, cover;
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      opacity: 0;
      transition: opacity .8s ease-in-out;
    }
    body.loaded { opacity: 1; }

    h1, h2 {
      margin: 40px 0 20px;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }

    table {
      width: 80%;
      margin: 0 auto;
      border-collapse: collapse;
      background: transparent;
      backdrop-filter: blur(4px);
    }
    th, td {
      padding: 10px;
      border: none;
      text-align: center;
      vertical-align: middle;
      font-size: 1.2rem;
    }
    td.team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 0;
      text-align: left;
    }
    img.logo {
      max-width: 35px;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    #tableBody tr:nth-child(odd)  { background: rgba(var(--row-color-odd),  var(--row-alpha)); }
    #tableBody tr:nth-child(even) { background: rgba(var(--row-color-even),var(--row-alpha)); }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
    #tableBody tr {
      opacity: 0;
      transform: translateY(20px);
      --delay: 0s;
      animation: slideInUp .5s ease-out forwards;
      animation-delay: var(--delay);
    }

    .no-data td {
      color: #fff;
      font-size: 1.1rem;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }

    .canva-toolbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
      font-size: 14px;
    }
    .canva-toolbar button {
      border: 0;
      border-radius: 6px;
      padding: 8px 12px;
      color: #111;
      background: #fff;
      font: 600 14px "Segoe UI", sans-serif;
      cursor: pointer;
    }
    .canva-toolbar button:hover { background: #eaf0ff; }
    .canva-toolbar button:disabled {
      cursor: wait;
      opacity: .65;
    }
    #canvaExportStatus {
      min-width: 130px;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
      white-space: nowrap;
    }

    body.canva-export-mode .canva-toolbar { display: flex; }
    body.exporting,
    body.exporting #tableBody tr {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
      animation: none !important;
    }
    body.exporting .canva-toolbar { display: none !important; }

    @media print {
      .canva-toolbar { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="canva-toolbar" data-html2canvas-ignore="true">
    <button id="copyCanvaBtn" type="button">Copy PNG</button>
    <button id="copyEditableBtn" type="button">Copy แบบแก้ไขได้</button>
    <button id="downloadCanvaBtn" type="button">Download PNG</button>
    <button id="downloadPptxBtn" type="button">Download PPTX แก้ไขได้</button>
    <span id="canvaExportStatus" aria-live="polite"></span>
  </div>

  <h2><br><br></h2>
  <div id="latestMessageContainer"></div>

  <table id="leagueTable">
    <thead>
      <tr>
        <th>อันดับ</th>
        <th>ทีม</th>
        <th>แข่ง</th>
        <th>ชนะ</th>
        <th>เสมอ</th>
        <th>แพ้</th>
        <th>ได้</th>
        <th>เสีย</th>
        <th>ได้-เสีย</th>
        <th>คะแนน</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
      const params = new URLSearchParams(window.location.search);
      if (params.get('canva') === '1' || params.get('export') === '1') {
        document.body.classList.add('canva-export-mode');
        if (window.location.protocol === 'file:') {
          const status = document.getElementById('canvaExportStatus');
          status.textContent = 'กรุณาเปิดผ่าน localhost เพื่อ export';
        }
      }
    });

const firebaseConfig = {
  apiKey: "AIzaSyC5VOsYQGQdav1BMw48GY9ErOuxd-tp6G8",
  authDomain: "alcohol-dd2b1.firebaseapp.com",
  databaseURL: "https://alcohol-dd2b1-default-rtdb.firebaseio.com",
  projectId: "alcohol-dd2b1",
  storageBucket: "alcohol-dd2b1.firebasestorage.app",
  messagingSenderId: "111449466001",
  appId: "1:111449466001:web:492984bb3519419fcf0b30",
  measurementId: "G-E2V3GPLSDB"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchesRef = ref(db, 'matches');

    const initTeam = () => ({ P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 });
    const copyCanvaBtn = document.getElementById('copyCanvaBtn');
    const copyEditableBtn = document.getElementById('copyEditableBtn');
    const downloadCanvaBtn = document.getElementById('downloadCanvaBtn');
    const downloadPptxBtn = document.getElementById('downloadPptxBtn');
    const canvaExportStatus = document.getElementById('canvaExportStatus');
    const tableHeaders = ['อันดับ', 'ทีม', 'แข่ง', 'ชนะ', 'เสมอ', 'แพ้', 'ได้', 'เสีย', 'ได้-เสีย', 'คะแนน'];
    let latestTableData = [];

    const setExportStatus = (message) => {
      canvaExportStatus.textContent = message;
    };

    const setExportBusy = (busy) => {
      copyCanvaBtn.disabled = busy;
      copyEditableBtn.disabled = busy;
      downloadCanvaBtn.disabled = busy;
      downloadPptxBtn.disabled = busy;
    };

    const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const waitForImages = async () => {
      const images = Array.from(document.images);
      await Promise.all(images.map(img => {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise(resolve => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      }));
    };

    const buildCanvasBlob = async () => {
      if (!window.html2canvas) {
        throw new Error('ไม่พบไลบรารี html2canvas กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่');
      }

      await waitForImages();
      document.body.classList.add('exporting');
      await wait(80);

      try {
        const canvas = await window.html2canvas(document.body, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: true,
          scrollX: 0,
          scrollY: -window.scrollY,
          windowWidth: document.documentElement.scrollWidth,
          windowHeight: Math.max(document.documentElement.scrollHeight, window.innerHeight)
        });

        return await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1));
      } finally {
        document.body.classList.remove('exporting');
      }
    };

    const downloadBlob = (blob) => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const dateText = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `alcohol-table-canva-${dateText}.png`;
      link.click();
      URL.revokeObjectURL(url);
    };

    const copyBlobToClipboard = async (blob) => {
      if (!navigator.clipboard || !window.ClipboardItem) {
        throw new Error('เบราว์เซอร์นี้ไม่รองรับการ copy รูปภาพโดยตรง');
      }

      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
    };

    const exportForCanva = async (mode) => {
      setExportBusy(true);
      setExportStatus(mode === 'copy' ? 'กำลัง Copy...' : 'กำลังสร้าง PNG...');

      try {
        const blob = await buildCanvasBlob();
        if (!blob) throw new Error('สร้างไฟล์ PNG ไม่สำเร็จ');

        if (mode === 'copy') {
          try {
            await copyBlobToClipboard(blob);
            setExportStatus('Copy แล้ว นำไปวางใน Canva ได้เลย');
          } catch (copyError) {
            downloadBlob(blob);
            setExportStatus('Copy ไม่ได้ ดาวน์โหลด PNG ให้แล้ว');
          }
        } else {
          downloadBlob(blob);
          setExportStatus('ดาวน์โหลดแล้ว');
        }
      } catch (error) {
        console.error(error);
        setExportStatus(error.message || 'Export ไม่สำเร็จ');
      } finally {
        setExportBusy(false);
        setTimeout(() => setExportStatus(''), 5000);
      }
    };

    const fileNameDate = () => new Date().toISOString().slice(0, 10);
    const escapeHtml = (value) => String(value).replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    const blobToDataUrl = (blob) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });

    const getAssetDataUrl = async (src, fallbackSrc = '') => {
      try {
        const response = await fetch(src);
        if (!response.ok) throw new Error(`โหลดรูปไม่สำเร็จ: ${src}`);
        return await blobToDataUrl(await response.blob());
      } catch (error) {
        if (!fallbackSrc || fallbackSrc === src) throw error;
        const response = await fetch(fallbackSrc);
        if (!response.ok) throw new Error(`โหลดรูปสำรองไม่สำเร็จ: ${fallbackSrc}`);
        return await blobToDataUrl(await response.blob());
      }
    };

    const getImageSize = (dataUrl) => new Promise(resolve => {
      const image = new Image();
      image.onload = () => resolve({ width: image.naturalWidth || 1, height: image.naturalHeight || 1 });
      image.onerror = () => resolve({ width: 1, height: 1 });
      image.src = dataUrl;
    });

    const buildEditableHtml = async () => {
      if (latestTableData.length === 0) {
        throw new Error('ยังไม่มีข้อมูลสำหรับ Copy แบบแก้ไขได้');
      }

      const bgData = await getAssetDataUrl('images/bg2.jpg');
      const mainLogoData = await getAssetDataUrl('images/logoalcohol2.png');
      const teamLogoData = {};

      for (const row of latestTableData) {
        const safeName = encodeURIComponent(row.team);
        teamLogoData[row.team] = await getAssetDataUrl(`${logoBasePath}/${safeName}.png`, defaultLogo);
      }

      const headerHtml = tableHeaders.map(header => (
        `<th style="padding:10px;border:0;text-align:center;vertical-align:middle;font:700 19px Segoe UI,sans-serif;color:#fff;">${escapeHtml(header)}</th>`
      )).join('');

      const rowsHtml = latestTableData.map((row, index) => {
        const bgColor = index % 2 === 0 ? 'rgba(71,110,236,.10)' : 'rgba(169,192,255,.10)';
        const rowCells = [
          `<td style="padding:10px;border:0;text-align:center;vertical-align:middle;font:400 19px Segoe UI,sans-serif;color:#fff;">${index + 1}</td>`,
          `<td style="padding:10px 10px 10px 0;border:0;text-align:left;vertical-align:middle;font:400 19px Segoe UI,sans-serif;color:#fff;white-space:nowrap;">
            <img src="${teamLogoData[row.team]}" alt="" style="width:35px;height:35px;object-fit:contain;vertical-align:middle;margin-right:8px;">
            <span>${escapeHtml(row.team)}</span>
          </td>`,
          row.P,
          row.W,
          row.D,
          row.L,
          row.GF,
          row.GA,
          row.GD,
          row.Pts
        ].map((cell, cellIndex) => {
          if (cellIndex < 2) return cell;
          return `<td style="padding:10px;border:0;text-align:center;vertical-align:middle;font:400 19px Segoe UI,sans-serif;color:#fff;">${escapeHtml(cell)}</td>`;
        }).join('');

        return `<tr style="background:${bgColor};">${rowCells}</tr>`;
      }).join('');

      const plainText = [
        tableHeaders.join('\t'),
        ...latestTableData.map((row, index) => [
          index + 1,
          row.team,
          row.P,
          row.W,
          row.D,
          row.L,
          row.GF,
          row.GA,
          row.GD,
          row.Pts
        ].join('\t'))
      ].join('\n');

      const html = `
        <div style="box-sizing:border-box;width:1024px;min-height:768px;padding:20px;background:url('${mainLogoData}') no-repeat center 20px / 250px auto,url('${bgData}') no-repeat center center / cover;color:#fff;font-family:Segoe UI,sans-serif;">
          <div style="height:112px;"></div>
          <table style="width:80%;margin:0 auto;border-collapse:collapse;background:transparent;">
            <thead><tr>${headerHtml}</tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;

      return { html, plainText };
    };

    const copyEditableHtml = async () => {
      if (!navigator.clipboard || !window.ClipboardItem) {
        setExportStatus('เบราว์เซอร์นี้ไม่รองรับ Copy แบบแก้ไขได้');
        return;
      }

      setExportBusy(true);
      setExportStatus('กำลัง Copy แบบแก้ไขได้...');

      try {
        const { html, plainText } = await buildEditableHtml();
        await navigator.clipboard.write([
          new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([plainText], { type: 'text/plain' })
          })
        ]);
        setExportStatus('Copy แบบแก้ไขได้แล้ว ลองวางใน Canva');
      } catch (error) {
        console.error(error);
        setExportStatus(error.message || 'Copy แบบแก้ไขได้ไม่สำเร็จ');
      } finally {
        setExportBusy(false);
        setTimeout(() => setExportStatus(''), 6000);
      }
    };

    const addEditableText = (slide, text, options) => {
      slide.addText(String(text), {
        margin: 0,
        fontFace: 'Segoe UI',
        color: 'FFFFFF',
        fit: 'shrink',
        valign: 'mid',
        breakLine: false,
        ...options
      });
    };

    const downloadEditablePptx = async () => {
      if (latestTableData.length === 0) {
        setExportStatus('ยังไม่มีข้อมูลสำหรับสร้าง PPTX');
        return;
      }

      const PptxGen = window.pptxgen || window.PptxGenJS;
      if (!PptxGen) {
        setExportStatus('ไม่พบไลบรารี PPTX กรุณาเชื่อมต่ออินเทอร์เน็ต');
        return;
      }
      if (!window.JSZip) {
        setExportStatus('ไม่พบ JSZip กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วโหลดหน้าใหม่');
        return;
      }

      setExportBusy(true);
      setExportStatus('กำลังสร้าง PPTX...');

      try {
        const pptx = new PptxGen();
        const rectShape = (pptx.ShapeType && pptx.ShapeType.rect) || 'rect';
        const slideW = 10.24;
        const rowH = 0.38;
        const tableY = 1.28;
        const slideH = Math.max(7.68, tableY + ((latestTableData.length + 1) * rowH) + 0.45);
        pptx.defineLayout({ name: 'CANVA_TABLE', width: slideW, height: slideH });
        pptx.layout = 'CANVA_TABLE';
        pptx.author = 'Scoreboard';
        pptx.company = 'Scoreboard';
        pptx.subject = 'Editable Canva league table';
        pptx.title = 'Alcohol Super League Table';
        pptx.lang = 'th-TH';

        const slide = pptx.addSlide();
        const bgData = await getAssetDataUrl('images/bg2.jpg');
        slide.addImage({ data: bgData, x: 0, y: 0, w: slideW, h: slideH });

        const logoData = await getAssetDataUrl('images/logoalcohol2.png');
        const logoSize = await getImageSize(logoData);
        const logoW = 2.5;
        const logoH = logoW * (logoSize.height / logoSize.width);
        slide.addImage({ data: logoData, x: (slideW - logoW) / 2, y: 0.2, w: logoW, h: logoH });

        const tableW = slideW * 0.8;
        const tableX = (slideW - tableW) / 2;
        const colW = [0.7, 2.55, 0.58, 0.58, 0.58, 0.58, 0.58, 0.58, 0.78, 0.68];
        const colScale = tableW / colW.reduce((sum, w) => sum + w, 0);
        const widths = colW.map(w => w * colScale);
        const rowColors = ['476EEC', 'A9C0FF'];

        let x = tableX;
        tableHeaders.forEach((header, colIndex) => {
          addEditableText(slide, header, {
            x,
            y: tableY,
            w: widths[colIndex],
            h: rowH,
            fontSize: 13,
            bold: true,
            align: 'center'
          });
          x += widths[colIndex];
        });

        for (const [rowIndex, row] of latestTableData.entries()) {
          const y = tableY + ((rowIndex + 1) * rowH);
          slide.addShape(rectShape, {
            x: tableX,
            y,
            w: tableW,
            h: rowH,
            fill: { color: rowColors[rowIndex % 2], transparency: 90 },
            line: { color: 'FFFFFF', transparency: 100 }
          });

          const safeName = encodeURIComponent(row.team);
          const logoSrc = `${logoBasePath}/${safeName}.png`;
          const rowValues = [
            rowIndex + 1,
            row.team,
            row.P,
            row.W,
            row.D,
            row.L,
            row.GF,
            row.GA,
            row.GD,
            row.Pts
          ];

          x = tableX;
          for (const [colIndex, value] of rowValues.entries()) {
            if (colIndex === 1) {
              const teamLogoData = await getAssetDataUrl(logoSrc, defaultLogo);
              slide.addImage({
                data: teamLogoData,
                x: x + 0.03,
                y: y + 0.055,
                w: 0.27,
                h: 0.27
              });
              addEditableText(slide, value, {
                x: x + 0.36,
                y,
                w: widths[colIndex] - 0.38,
                h: rowH,
                fontSize: 12.5,
                align: 'left'
              });
            } else {
              addEditableText(slide, value, {
                x,
                y,
                w: widths[colIndex],
                h: rowH,
                fontSize: 13,
                align: 'center'
              });
            }
            x += widths[colIndex];
          }
        }

        await pptx.writeFile({ fileName: `alcohol-table-canva-editable-${fileNameDate()}.pptx` });
        setExportStatus('ดาวน์โหลด PPTX แล้ว นำเข้า Canva ได้เลย');
      } catch (error) {
        console.error(error);
        setExportStatus(error.message || 'สร้าง PPTX ไม่สำเร็จ');
      } finally {
        setExportBusy(false);
        setTimeout(() => setExportStatus(''), 6000);
      }
    };

    copyCanvaBtn.addEventListener('click', () => exportForCanva('copy'));
    copyEditableBtn.addEventListener('click', copyEditableHtml);
    downloadCanvaBtn.addEventListener('click', () => exportForCanva('download'));
    downloadPptxBtn.addEventListener('click', downloadEditablePptx);

    const renderNoData = () => {
      latestTableData = [];
      document.getElementById('tableBody').innerHTML = `
        <tr class="no-data">
          <td colspan="10">ยังไม่มีข้อมูลการแข่งขัน</td>
        </tr>
      `;
    };

    // พาธโฟลเดอร์โลโก้ & โลโก้สำรอง
    const logoBasePath = 'logos';
    const defaultLogo  = 'images/logo.png';

    onValue(matchesRef, snapshot => {
      const stats = {};
      if (!snapshot.exists()) {
        renderNoData();
        return;
      }

      snapshot.forEach(child => {
        const { teamA, teamB, scoreA, scoreB } = child.val() || {};
        if (!teamA || !teamB) return;
        const aName = teamA.trim();
        const bName = teamB.trim();

        if (!stats[aName]) stats[aName] = initTeam();
        if (!stats[bName]) stats[bName] = initTeam();

        const a = Number(scoreA);
        const b = Number(scoreB);
        if (!Number.isFinite(a) || !Number.isFinite(b)) return;

        stats[aName].P++;
        stats[bName].P++;
        stats[aName].GF += a;
        stats[aName].GA += b;
        stats[bName].GF += b;
        stats[bName].GA += a;

        if (a > b) {
          stats[aName].W++;
          stats[aName].Pts += 3;
          stats[bName].L++;
        } else if (a < b) {
          stats[bName].W++;
          stats[bName].Pts += 3;
          stats[aName].L++;
        } else {
          stats[aName].D++;
          stats[bName].D++;
          stats[aName].Pts++;
          stats[bName].Pts++;
        }
      });

      const tableData = Object.keys(stats).map(team => {
        const s = stats[team];
        s.GD = s.GF - s.GA;
        return { team, ...s };
      });

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      if (tableData.length === 0) {
        renderNoData();
        return;
      }

      tableData.sort((a, b) => {
        if (b.Pts !== a.Pts) return b.Pts - a.Pts;
        if (b.GD  !== a.GD ) return b.GD  - a.GD;
        if (b.GF  !== a.GF ) return b.GF  - a.GF;
        return a.team.localeCompare(b.team);
      });
      latestTableData = tableData;

      tableData.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.style.setProperty('--delay', `${i * 0.05}s`);

        // สร้างชื่อไฟล์โลโก้ + .png และเข้ารหัสชื่อทีมก่อน
        const safeName = encodeURIComponent(row.team);
        const logoSrc  = `${logoBasePath}/${safeName}.png`;

        tr.innerHTML = `
          <td>${i + 1}</td>
          <td class="team-cell">
            <img
              class="logo"
              src="${logoSrc}"
              alt="${row.team} logo"
              onerror="this.onerror=null; this.src='${defaultLogo}'"
            >
            ${row.team}
          </td>
          <td>${row.P}</td>
          <td>${row.W}</td>
          <td>${row.D}</td>
          <td>${row.L}</td>
          <td>${row.GF}</td>
          <td>${row.GA}</td>
          <td>${row.GD}</td>
          <td>${row.Pts}</td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
