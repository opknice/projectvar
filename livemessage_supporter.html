<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Supporter Marquee</title>
  <style>
    /* เบื้องหลังทั้งหมด */
    html, body {
      height: 100%;
      margin: 0;
      background-color: #00ff00;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 2rem;
      background: #00ff00;
    }

    h1 {
      margin-bottom: 1rem;
      color: #333;
    }

    /* marquee container */
    #score-marquee {
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      background: #00ff00;
      color: #fff;
      padding: 3rem;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      font-size: 2rem;
      font-weight: bold;
      width: 100%;
      box-sizing: border-box;
      margin: 0 auto;
      transition: opacity 0.8s ease, transform 0.8s ease;
      opacity: 1;
      transform: translateY(0);
    }

    /* ซ่อนเมื่อไม่มีข้อมูล */
    #score-marquee.hidden {
      display: none;
      opacity: 0;
      pointer-events: none;
    }

    /* ตัวหนังสือเลื่อน */
    .scrolling-text {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 150s linear infinite;
      
    }

    /* ป้ายหัวข้อ */
    .supporter-label {
      background: #fff;
      color: #000;
      padding: 0.2rem 0.4rem;
      border-radius: 0.2rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      display: inline-block;
      margin: 0 0.3rem;
      white-space: nowrap;
    }

    /* หยุดเมื่อ hover */
    #score-marquee:hover .scrolling-text {
      animation-play-state: paused;
    }

    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <h1>ข้อมูล Supporter</h1>

  <div id="score-marquee" class="hidden">
    <div class="scrolling-text" id="scrolling-content">
      กำลังโหลดข้อมูล...
    </div>
  </div>

  <script>
    // — 1. เตรียม Marquee container
    const marqueeEl = document.getElementById('score-marquee');
    const contentEl = document.getElementById('scrolling-content');
    const supporterFile = 'livemessage_supporter.txt';
    const reloadIntervalMs = 10000;
    marqueeEl.classList.add('hidden');

    function showMarquee() {
      marqueeEl.classList.remove('hidden');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text;
      return div.innerHTML;
    }

    // — 2. อ่านรายชื่อผู้สนับสนุนจากไฟล์ txt
    async function loadSupporters() {
      try {
        const response = await fetch(`${supporterFile}?t=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Cannot load ${supporterFile}`);
        }

        const text = await response.text();
        renderSupporters(text);
      }
      catch (err) {
        console.error('Load supporter error:', err);
        marqueeEl.classList.add('hidden');
      }
    }

    // — 3. แสดงรายชื่อเป็นตัวหนังสือวิ่ง
    function renderSupporters(text) {
      const supporters = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (!supporters.length) {
        marqueeEl.classList.add('hidden');
        return;
      }

      const label = '<span class="supporter-label">🙏 ขอบคุณผู้สนับสนุน</span>';
      const spacing = '&nbsp;'.repeat(20);
      const parts = [];

      supporters.forEach((name, index) => {
        if (index > 0 && index % 5 === 0) {
          parts.push(label);
        }

        parts.push(escapeHtml(name));
      });

      const names = parts.join(spacing);
      contentEl.innerHTML = `${label}&nbsp;&nbsp;${names}`;
      showMarquee();
    }

    // — 4. เริ่มทำงานเมื่อ DOM โหลดเสร็จ และอ่านไฟล์ซ้ำเป็นระยะ
    function init() {
      loadSupporters();
      setInterval(loadSupporters, reloadIntervalMs);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
